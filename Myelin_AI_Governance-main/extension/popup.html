<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myelin Sentinel</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Myelin Sentinel</p>
      <h1>Browser Extension</h1>
      <p class="subcopy">Audit page text or route prompts through your local Myelin stack.</p>
    </section>

    <section class="panel">
      <div class="field">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="agent">Agent Proxy</option>
          <option value="audit" selected>Audit API</option>
        </select>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="agentUrl">Agent URL</label>
          <input id="agentUrl" value="http://localhost:9000/v1/audit/text">
        </div>
        <div class="field">
          <label for="auditUrl">Audit URL</label>
          <input id="auditUrl" value="http://localhost:8000/api/v1/audit/conversation">
        </div>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="model">Model</label>
          <input id="model" value="llama3.1:8b">
        </div>
        <div class="field">
          <label for="temperature">Temperature</label>
          <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.2">
        </div>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="agentApiKey">Agent API Key</label>
          <input id="agentApiKey" type="password" placeholder="Optional bearer/api key">
        </div>
        <div class="field">
          <label for="auditApiKey">Audit API Key</label>
          <input id="auditApiKey" type="password" placeholder="Optional x-api-key">
        </div>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="timeoutMs">Timeout (ms)</label>
          <input id="timeoutMs" type="number" min="1000" step="1000" value="90000">
        </div>
        <div class="field">
          <label for="sourceMode">Input Source</label>
          <select id="sourceMode">
            <option value="manual">Manual</option>
            <option value="selection">Selection</option>
            <option value="page">Page Text</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="prompt">Prompt or text to review</label>
        <textarea id="prompt" rows="8" placeholder="Ask the Myelin agent something, or paste content to audit."></textarea>
      </div>

      <div class="button-row">
        <button id="useSelection" class="secondary">Use Selection</button>
        <button id="usePage" class="secondary">Use Page Text</button>
        <button id="checkService" class="secondary">Check Service</button>
        <button id="saveSettings" class="ghost">Save</button>
        <button id="runAction">Run Myelin</button>
      </div>
    </section>

    <section class="panel">
      <div class="status-row">
        <div>
          <p class="result-label">Status</p>
          <p id="status" class="status idle">Ready</p>
        </div>
        <div>
          <p class="result-label">Page</p>
          <p id="pageMeta" class="meta">No page context yet</p>
        </div>
      </div>

      <div class="result-block">
        <p class="result-label">Audit Summary</p>
        <pre id="auditBox">No audit data yet.</pre>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
